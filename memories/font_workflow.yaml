# ==============================================================================
# 使用例
# ==============================================================================

usage_examples:
  
  example_1:
    user_input: "上品なフォントにしたい"
    expected_flow:
      - step: 1
        action: "雰囲気を確認（この場合、ユーザーが「上品」と言っているのでelegantと判断）"
      - step: 2
        action: "見出しフォントの選択肢を提示（cormorant, noto-serif, noto-sans, cardo）"
        wait: true
      - step: 3
        action: "本文フォントの選択肢を提示（ユーザーが選択した後）"
        wait: true
      - step: 4
        action: "確認して実行"
      - step: 5
        action: "完了報告"
  
  example_2:
    user_input: "かわいいフォントで、見出しはzen-maru、本文はnoto-sansにして"
    expected_flow:
      - step: 1
        action: "スキップ（雰囲気が明示されている: kawaii）"
      - step: 2
        action: "スキップ（見出しフォントが明示されている: zen-maru）"
      - step: 3
        action: "スキップ（本文フォントが明示されている: noto-sans）"
      - step: 4
        action: "確認して実行"
      - step: 5
        action: "完了報告"
  
  violation_example:
    user_input: "上品なフォントにしたい"
    wrong_action: |
      ❌ 間違った対応:
      「上品なフォントとして Noto Serif JP をセットアップします」
      → 選択肢を提示せずに勝手に決定している（違反）
    
    correct_action: |
      ✅ 正しい対応:
      「上品なフォントですね！
      まず、見出し用フォントを選んでください：
      1. cormorant: Cormorant Garamond（セリフ体）- エレガント
      2. noto-serif: Noto Serif JP（明朝体）- 日本的な上品さ
      ...」
      → ユーザーに選択肢を提示して選んでもらう（正解）

# ==============================================================================
# トラブルシューティング
# ==============================================================================

troubleshooting:
  
  issue_1:
    problem: "AIがステップ2をスキップして勝手にフォントを選択する"
    solution: |
      - step_2.skip_allowed が false であることを確認
      - step_2.status が CRITICAL であることを強調
      - violation_warning を読んで、違反例を理解する
  
  issue_2:
    problem: "ユーザーが具体的なフォント名を指定した場合の対応"
    solution: |
      - ユーザーが「zen-maruで」と言った場合、それが有効な選択肢かチェック
      - 有効なら確認の上で実行、無効なら選択肢を提示
  
  issue_3:
    problem: "このワークフローが発動しない"
    solution: |
      - triggers.keywords を確認
      - ユーザーの入力にトリガーキーワードが含まれているか確認
      - 含まれていれば必ずこのワークフローを実行すること
  
  issue_4:
    problem: "複数ページのサイトでフォントが変更できない（1ページ構成では動作する）"
    symptom: |
      - 1ページ構成のサイトではフォントが正しく適用される
      - 複数ページ構成（/home, /products, /story など）ではフォントが反映されない
      - setup-fonts.js を実行してもフォントが変わらない
    root_cause: |
      🚨 フォントCSSの重複インポートが原因
      
      問題のあるパターン：
      1. app/layout.tsx で：
         import "../lib/fonts/_active.css";
         import "../lib/fonts/_vars.css";
      
      2. app/globals.css で：
         @import "../lib/fonts/_active.css";
         @import "../lib/fonts/_vars.css";
      
      なぜ1ページでは動き、複数ページでは動かないのか？
      - 1ページ構成：シンプルな構造のため、重複インポートでも読み込み順序が安定
      - 複数ページ構成：各ページで異なるコンポーネントツリーがあり、
        CSS読み込み順序が不安定になり、フォント変数（--font-display, --font-body）が
        正しく適用されない
      
      技術的詳細：
      - Tailwind CSS v4 の @import "tailwindcss" の後に他の @import を使用すると、
        読み込み順序が不安定になる
      - CSS変数が複数回定義されると、最後に読み込まれたものが適用されるが、
        複数ページの場合はページごとに読み込み順序が異なる可能性がある
      - Next.jsのルートレイアウトはすべてのページに適用されるべきだが、
        globals.cssでの重複インポートがこれを妨げる
    
    solution: |
      ✅ 解決方法（必ずこの順序で実行）：
      
      1. app/globals.css を開く
      
      2. 以下の2行を削除：
         @import "../lib/fonts/_active.css";
         @import "../lib/fonts/_vars.css";
      
      3. app/layout.tsx のインポートは残す（削除しない）：
         import "../lib/fonts/_active.css";  // ← これは残す
         import "../lib/fonts/_vars.css";     // ← これは残す
      
      4. 理由：
         - layout.tsx でのインポート → すべてのページに確実に適用される
         - globals.css での重複インポート → 削除することで読み込み順序を安定化
      
      5. 確認方法：
         - npm run dev でサーバー再起動
         - 複数のページ（/home, /products など）を開く
         - 開発者ツールで computed styles を確認
         - font-family が正しく適用されていることを確認
    
    prevention: |
      🔒 予防策（プロジェクト作成時に必ず確認）：
      
      1. setup-fonts.js の updateGlobalCSS() 関数を修正：
         - フォントCSSの @import を追加しないようにする
         - @theme 定義のみを追加する
      
      2. プロジェクトテンプレートのチェックリスト：
         ✓ app/layout.tsx にフォントCSSをインポート
         ✗ app/globals.css にフォントCSSを重複インポートしない
         ✓ app/globals.css には @theme 定義のみ含める
      
      3. setup-fonts.js 実行後の確認：
         - app/globals.css に @import "../lib/fonts/_active.css" がないことを確認
         - app/layout.tsx に import "../lib/fonts/_active.css" があることを確認
    
    related_files:
      - "app/globals.css"
      - "app/layout.tsx"
      - "lib/fonts/_active.css"
      - "lib/fonts/_vars.css"
      - "scripts/setup-fonts.js"

