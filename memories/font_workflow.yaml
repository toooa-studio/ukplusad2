# ==============================================================================
# 🚨 CRITICAL WORKFLOW: フォント設定プロセス（絶対遵守）
# ==============================================================================
# 
# ⚠️ このワークフローは MANDATORY（必須）です
# ⚠️ このファイルに記載されたステップを省略することは禁止されています
# ⚠️ ユーザーからフォント関連の要望があった場合、必ずこのフローに従ってください
#
# Priority: CRITICAL
# Version: 3.0
# Last Updated: 2025-10-16
#
# ==============================================================================

metadata:
  priority: CRITICAL
  enforcement: MANDATORY
  violation_action: STOP_AND_FOLLOW_WORKFLOW
  
# ------------------------------------------------------------------------------
# トリガー条件（これらのキーワードが出たら必ずこのワークフローを実行）
# ------------------------------------------------------------------------------

triggers:
  keywords:
    - "フォント"
    - "font"
    - "かわいい"
    - "可愛い"
    - "kawaii"
    - "上品"
    - "高級"
    - "エレガント"
    - "elegant"
    - "やさしい"
    - "ナチュラル"
    - "natural"
    - "かっこいい"
    - "クール"
    - "cool"
    - "シンプル"
    - "simple"
    - "ポップ"
    - "pop"
    - "和風"
    - "和"
    - "wa"
    - "フォント変更"
    - "フォント設定"
  
  conditions:
    - "ユーザーがフォントの雰囲気について言及した場合"
    - "ユーザーがフォント変更を希望した場合"
    - "ユーザーがデザインの印象について話した場合"

# ------------------------------------------------------------------------------
# ワークフロー実行ルール
# ------------------------------------------------------------------------------

workflow_rules:
  rule_1:
    description: "ステップは順番に実行すること"
    enforcement: MANDATORY
    
  rule_2:
    description: "ステップ2とステップ3は絶対にスキップ禁止"
    enforcement: CRITICAL
    reason: "ユーザーに選択肢を提示せずに勝手に決定することは厳禁"
    
  rule_3:
    description: "各ステップでユーザーの入力を待つこと"
    enforcement: MANDATORY
    reason: "AIが勝手に選択を進めてはいけない"
    
  rule_4:
    description: "ステップを飛ばして実行することは禁止"
    enforcement: CRITICAL
    violation_example: "ユーザーが「上品なフォント」と言ったからといって、選択肢を提示せずにnoto-serifを自動選択して実行することは違反"

# ------------------------------------------------------------------------------
# 必須実行ステップ
# ------------------------------------------------------------------------------

workflow:
  
  # ============================================================================
  # STEP 1: 雰囲気の確認
  # ============================================================================
  
  step_1:
    name: "雰囲気の確認"
    status: MANDATORY
    skip_allowed: false
    
    trigger_check:
      - "ユーザーが明示的に雰囲気を指定した場合はスキップ可能"
      - "例: 「elegantで」「かわいいフォント」など"
    
    action: |
      ユーザーに雰囲気の選択肢を提示する
    
    response_template: |
      フォント設定を行いますね！
      どんな雰囲気のフォントをお探しですか？
      
      1. かわいい（kawaii）- やわらかい丸ゴシック系
      2. 上品・高級感（elegant）- セリフ体・明朝体系
      3. やさしい・ナチュラル（natural）- 読みやすいゴシック系
      4. かっこいい（cool）- モダン・テック系
      5. シンプル（simple）- ミニマル・クリーン系
      6. ポップ（pop）- 明るい・インパクト系
      7. 和風（wa）- 日本的・伝統的
      
      番号または名前で教えてください。
    
    user_input_mapping:
      "1": kawaii
      "かわいい": kawaii
      "kawaii": kawaii
      "2": elegant
      "上品": elegant
      "elegant": elegant
      "3": natural
      "やさしい": natural
      "natural": natural
      "4": cool
      "かっこいい": cool
      "cool": cool
      "5": simple
      "シンプル": simple
      "simple": simple
      "6": pop
      "ポップ": pop
      "pop": pop
      "7": wa
      "和風": wa
      "wa": wa
    
    next_step: "step_2"
  
  # ============================================================================
  # STEP 2: 見出しフォントの選択（🚨 CRITICAL - 絶対スキップ禁止）
  # ============================================================================
  
  step_2:
    name: "見出しフォントの選択肢提示"
    status: CRITICAL
    skip_allowed: false
    skip_prohibition: "このステップをスキップすることは絶対に禁止されています"
    
    action: |
      選択された雰囲気に応じて、見出しフォントの選択肢を提示する
      ⚠️ ユーザーの選択を待つこと（勝手に選んではいけない）
    
    violation_warning: |
      ❌ 違反例: ユーザーが「上品なフォント」と言ったからといって、
      選択肢を提示せずに noto-serif を勝手に選択して実行することは禁止
    
    options_by_vibe:
      
      kawaii:
        prompt: |
          かわいいフォントですね！
          まず、見出し用フォントを選んでください：
          
          1. zen-maru: Zen Maru Gothic（丸ゴシック）- やわらかい印象
          2. zen-kaku: Zen Kaku Gothic New（ゴシック）- 読みやすい
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": zen-maru
          "zen-maru": zen-maru
          "2": zen-kaku
          "zen-kaku": zen-kaku
      
      elegant:
        prompt: |
          上品なフォントですね！
          まず、見出し用フォントを選んでください：
          
          1. cormorant: Cormorant Garamond（セリフ体）- エレガント
          2. noto-serif: Noto Serif JP（明朝体）- 日本的な上品さ
          3. noto-sans: Noto Sans JP（ゴシック）- モダンな上品さ
          4. cardo: Cardo（クラシック）- 伝統的
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": cormorant
          "cormorant": cormorant
          "2": noto-serif
          "noto-serif": noto-serif
          "3": noto-sans
          "noto-sans": noto-sans
          "4": cardo
          "cardo": cardo
      
      natural:
        prompt: |
          やさしいフォントですね！
          まず、見出し用フォントを選んでください：
          
          1. noto-sans: Noto Sans JP（ゴシック）- 読みやすい
          2. zen-maru: Zen Maru Gothic（丸ゴシック）- やわらかい
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": noto-sans
          "noto-sans": noto-sans
          "2": zen-maru
          "zen-maru": zen-maru
      
      cool:
        prompt: |
          かっこいいフォントですね！
          まず、見出し用フォントを選んでください：
          
          1. poppins: Poppins（モダン）- スタイリッシュ
          2. noto-sans: Noto Sans JP（ゴシック）- シャープ
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": poppins
          "poppins": poppins
          "2": noto-sans
          "noto-sans": noto-sans
      
      simple:
        prompt: |
          シンプルなフォントですね！
          まず、見出し用フォントを選んでください：
          
          1. inter: Inter（モダン）- ミニマル
          2. zen-kaku: Zen Kaku Gothic New（ゴシック）- すっきり
          3. noto-sans: Noto Sans JP（ゴシック）- 標準的
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": inter
          "inter": inter
          "2": zen-kaku
          "zen-kaku": zen-kaku
          "3": noto-sans
          "noto-sans": noto-sans
      
      pop:
        prompt: |
          ポップなフォントですね！
          まず、見出し用フォントを選んでください：
          
          1. zen-kaku: Zen Kaku Gothic New（ゴシック）- 明るい
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": zen-kaku
          "zen-kaku": zen-kaku
      
      wa:
        prompt: |
          和風のフォントですね！
          まず、見出し用フォントを選んでください：
          
          1. shippori-mincho: Shippori Mincho（明朝体）- 伝統的
          2. zen-kaku: Zen Kaku Gothic New（ゴシック）- モダンな和
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": shippori-mincho
          "shippori-mincho": shippori-mincho
          "2": zen-kaku
          "zen-kaku": zen-kaku
    
    wait_for_user_input: true
    next_step: "step_3"
  
  # ============================================================================
  # STEP 3: 本文フォントの選択（🚨 CRITICAL - 絶対スキップ禁止）
  # ============================================================================
  
  step_3:
    name: "本文フォントの選択肢提示"
    status: CRITICAL
    skip_allowed: false
    skip_prohibition: "このステップをスキップすることは絶対に禁止されています"
    
    action: |
      見出しフォント選択後、本文フォントの選択肢を提示する
      ⚠️ ユーザーの選択を待つこと（勝手に選んではいけない）
    
    violation_warning: |
      ❌ 違反例: 見出しと同じフォントを自動的に本文にも適用することは禁止
      必ずユーザーに選択肢を提示すること
    
    options_by_vibe:
      
      kawaii:
        prompt: |
          承知しました！次は本文用フォントを選んでください：
          
          1. zen-maru: Zen Maru Gothic（丸ゴシック）- やわらかい
          2. zen-kaku: Zen Kaku Gothic New（ゴシック）- 読みやすい
          3. noto-sans: Noto Sans JP（デフォルト）- 標準的
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": zen-maru
          "zen-maru": zen-maru
          "2": zen-kaku
          "zen-kaku": zen-kaku
          "3": noto-sans
          "noto-sans": noto-sans
      
      elegant:
        prompt: |
          承知しました！次は本文用フォントを選んでください：
          
          1. cormorant: Cormorant Garamond（セリフ体）- エレガント
          2. noto-serif: Noto Serif JP（明朝体）- 読みやすい明朝
          3. noto-sans-body: Noto Sans JP（ゴシック）- モダン
          4. cardo: Cardo（クラシック）- 伝統的
          5. noto-sans: Noto Sans JP（デフォルト）- 標準的
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": cormorant
          "cormorant": cormorant
          "2": noto-serif
          "noto-serif": noto-serif
          "3": noto-sans-body
          "noto-sans-body": noto-sans-body
          "4": cardo
          "cardo": cardo
          "5": noto-sans
          "noto-sans": noto-sans
      
      natural:
        prompt: |
          承知しました！次は本文用フォントを選んでください：
          
          1. noto-sans-var: Noto Sans JP（ゴシック）- 読みやすい
          2. zen-maru: Zen Maru Gothic（丸ゴシック）- やわらかい
          3. noto-sans: Noto Sans JP（デフォルト）- 標準的
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": noto-sans-var
          "noto-sans-var": noto-sans-var
          "2": zen-maru
          "zen-maru": zen-maru
          "3": noto-sans
          "noto-sans": noto-sans
      
      cool:
        prompt: |
          承知しました！次は本文用フォントを選んでください：
          
          1. poppins: Poppins（モダン）- スタイリッシュ
          2. noto-sans-body: Noto Sans JP（ゴシック）- 読みやすい
          3. noto-sans: Noto Sans JP（デフォルト）- 標準的
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": poppins
          "poppins": poppins
          "2": noto-sans-body
          "noto-sans-body": noto-sans-body
          "3": noto-sans
          "noto-sans": noto-sans
      
      simple:
        prompt: |
          承知しました！次は本文用フォントを選んでください：
          
          1. inter: Inter（モダン）- ミニマル
          2. zen-kaku: Zen Kaku Gothic New（ゴシック）- すっきり
          3. noto-sans-body: Noto Sans JP（ゴシック）- 読みやすい
          4. noto-sans: Noto Sans JP（デフォルト）- 標準的
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": inter
          "inter": inter
          "2": zen-kaku
          "zen-kaku": zen-kaku
          "3": noto-sans-body
          "noto-sans-body": noto-sans-body
          "4": noto-sans
          "noto-sans": noto-sans
      
      pop:
        prompt: |
          承知しました！次は本文用フォントを選んでください：
          
          1. zen-kaku: Zen Kaku Gothic New（ゴシック）- 読みやすい
          2. noto-sans: Noto Sans JP（デフォルト）- 標準的
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": zen-kaku
          "zen-kaku": zen-kaku
          "2": noto-sans
          "noto-sans": noto-sans
      
      wa:
        prompt: |
          承知しました！次は本文用フォントを選んでください：
          
          1. shippori-mincho: Shippori Mincho（明朝体）- 伝統的
          2. zen-kaku: Zen Kaku Gothic New（ゴシック）- モダンな和
          3. noto-sans: Noto Sans JP（デフォルト）- 標準的
          
          どれにしますか？（番号またはキーで答えてください）
        
        choices:
          "1": shippori-mincho
          "shippori-mincho": shippori-mincho
          "2": zen-kaku
          "zen-kaku": zen-kaku
          "3": noto-sans
          "noto-sans": noto-sans
    
    wait_for_user_input: true
    next_step: "step_4"
  
  # ============================================================================
  # STEP 4: 確認と実行
  # ============================================================================
  
  step_4:
    name: "設定確認と実行"
    status: MANDATORY
    skip_allowed: false
    
    action: |
      選択内容をユーザーに確認し、コマンドを実行する
    
    response_template: |
      承知しました！以下の設定でフォントをセットアップします：
      
      - 雰囲気: {vibe_name}（{vibe_key}）
      - 見出しフォント: {display_font_name}
      - 本文フォント: {body_font_name}
      
      実行します...
    
    command_template: |
      node scripts/setup-fonts.js {vibe} --display={display_key} --body={body_key}
    
    command_example: |
      node scripts/setup-fonts.js elegant --display=noto-serif --body=noto-serif
    
    next_step: "step_5"
  
  # ============================================================================
  # STEP 5: 完了報告
  # ============================================================================
  
  step_5:
    name: "完了報告と次のステップ案内"
    status: MANDATORY
    skip_allowed: false
    
    action: |
      実行結果を報告し、次のステップを案内する
    
    response_template: |
      ✅ フォント設定が完了しました！
      
      設定内容:
      - 見出し: {display_font_name}
      - 本文: {body_font_name}
      
      📋 次のステップ（必須）:
      1. 開発サーバーを再起動してください（Ctrl+C → npm run dev）
      2. ブラウザでハードリロード（Mac: Cmd+Shift+R / Win: Ctrl+Shift+F5）
      3. ブラウザで http://localhost:3000 を開いて確認
      
      ⚠️ 重要: 次のステップ6（再発防止チェックリスト）を必ず実行してください。
      複数ページでの問題を未然に防ぐための必須チェックです。
      
      💡 フォントが気に入らない場合は、いつでも別のフォントに変更できます。
      「フォント変更」と言っていただければ、再度選択できます。
    
    next_step: "step_6"
  
  # ============================================================================
  # STEP 6: 再発防止チェック（新規追加）
  # ============================================================================
  
  step_6:
    name: "再発防止チェックリスト"
    status: MANDATORY
    skip_allowed: false
    
    action: |
      複数ページでのフォント適用問題を未然に防ぐため、
      以下の項目を必ず確認してください（MANDATORY）
    
    checklist:
      
      check_1:
        name: "globals.css の :root セクション確認"
        verification: |
          app/globals.css を開いて、以下が存在することを確認：
          
          :root {
            --font-display: "フォント名", serif;
            --font-body: "フォント名", sans-serif;
          }
        
        status: |
          ✅ setup-fonts.js が自動的に追加・更新します
          確認のみで問題ありません
        
        action_if_missing: |
          再度 npm run setup-fonts:xxx を実行してください
      
      check_2:
        name: "@utility の不使用確認"
        verification: |
          globals.css に以下が存在しないことを確認：
          
          @utility font-display { ... }
          @utility font-body { ... }
        
        reason: |
          Tailwind CSS v4 では @utility の動作が不安定です
          @theme のみを使用してください
        
        action_if_exists: |
          npm run setup-font-project を実行すると自動削除されます
          または手動で削除してください
      
      check_3:
        name: "重複インポートの不存在確認"
        verification: |
          globals.css に以下が存在しないことを確認：
          
          @import "../lib/fonts/_active.css";
          @import "../lib/fonts/_vars.css";
        
        reason: |
          layout.tsx でインポートするため、globals.css での重複は
          CSS読み込み順序を不安定にします（複数ページ問題の原因）
        
        status: |
          ✅ setup-fonts.js が自動的に削除します
        
        action_if_exists: |
          手動で削除してください
      
      check_4:
        name: "layout.tsx の body クラス確認"
        verification: |
          app/layout.tsx を開いて、以下になっているか確認：
          
          <body className="antialiased font-sans">
        
        note: |
          font-body ではなく font-sans を使用します
          （Tailwind CSS v4 標準）
        
        action_if_wrong: |
          className を "antialiased font-sans" に変更してください
      
      check_5:
        name: "開発サーバー完全再起動"
        verification: |
          以下の手順で再起動してください：
          
          1. Ctrl+C でサーバー停止
          2. npm run dev で再起動
        
        reason: |
          ホットリロードでは反映されない場合があります
          必ず完全再起動してください
        
        alternative: |
          ポートが使用中の場合：
          kill -9 $(lsof -ti:3000) 2>/dev/null || true
          npm run dev
      
      check_6:
        name: "ブラウザハードリロード"
        verification: |
          Mac: Cmd + Shift + R
          Windows/Linux: Ctrl + Shift + F5
        
        reason: |
          フォントファイルのキャッシュをクリアします
        
        advanced: |
          開発者ツール → Network タブ → Disable cache にチェック
    
    troubleshooting_reference: |
      詳細なトラブルシューティングは以下を参照：
      - memories/font_workflow.yaml の issue_4
      - font_not_applied_issue.yaml

# ==============================================================================
# フォント設定マッピング（参照用）
# ==============================================================================

