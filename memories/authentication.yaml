sections:
  - name: "NextAuth.js v5 セットアップ"
    content: |
      ## NextAuth.js（Auth.js）の導入
      
      ### 1. インストール
      ```bash
      npm install next-auth@beta
      npm install bcryptjs @types/bcryptjs
      ```
      
      ### 2. 環境変数の設定
      ```bash
      # .env.local
      NEXTAUTH_URL="http://localhost:3000"
      NEXTAUTH_SECRET="your-secret-key-here"  # openssl rand -base64 32 で生成
      
      # OAuth Provider（オプション）
      GOOGLE_CLIENT_ID="your-google-client-id"
      GOOGLE_CLIENT_SECRET="your-google-client-secret"
      
      GITHUB_ID="your-github-id"
      GITHUB_SECRET="your-github-secret"
      ```
      
      ### 3. Auth設定ファイル
      ```typescript
      // lib/auth/config.ts
      import { NextAuthOptions } from 'next-auth';
      import CredentialsProvider from 'next-auth/providers/credentials';
      import GoogleProvider from 'next-auth/providers/google';
      import GitHubProvider from 'next-auth/providers/github';
      import bcrypt from 'bcryptjs';
      import { prisma } from '@/lib/db/prisma';
      
      export const authOptions: NextAuthOptions = {
        providers: [
          CredentialsProvider({
            name: 'Credentials',
            credentials: {
              email: { label: "Email", type: "email" },
              password: { label: "Password", type: "password" }
            },
            async authorize(credentials) {
              if (!credentials?.email || !credentials?.password) {
                throw new Error('メールアドレスとパスワードを入力してください');
              }
              
              const user = await prisma.user.findUnique({
                where: { email: credentials.email },
              });
              
              if (!user || !user.password) {
                throw new Error('ユーザーが見つかりません');
              }
              
              const isPasswordValid = await bcrypt.compare(
                credentials.password,
                user.password
              );
              
              if (!isPasswordValid) {
                throw new Error('パスワードが正しくありません');
              }
              
              return {
                id: user.id,
                email: user.email,
                name: user.name,
                role: user.role,
              };
            }
          }),
          GoogleProvider({
            clientId: process.env.GOOGLE_CLIENT_ID!,
            clientSecret: process.env.GOOGLE_CLIENT_SECRET!,
          }),
          GitHubProvider({
            clientId: process.env.GITHUB_ID!,
            clientSecret: process.env.GITHUB_SECRET!,
          }),
        ],
        pages: {
          signIn: '/login',
          signOut: '/logout',
          error: '/auth/error',
          verifyRequest: '/auth/verify',
        },
        callbacks: {
          async jwt({ token, user }) {
            if (user) {
              token.id = user.id;
              token.role = user.role;
            }
            return token;
          },
          async session({ session, token }) {
            if (session.user) {
              session.user.id = token.id as string;
              session.user.role = token.role as string;
            }
            return session;
          },
        },
        session: {
          strategy: 'jwt',
          maxAge: 30 * 24 * 60 * 60, // 30日
        },
        secret: process.env.NEXTAUTH_SECRET,
      };
      ```
      
      ### 4. API Route
      ```typescript
      // app/api/auth/[...nextauth]/route.ts
      import NextAuth from 'next-auth';
      import { authOptions } from '@/lib/auth/config';
      
      const handler = NextAuth(authOptions);
      
      export { handler as GET, handler as POST };
      ```

  - name: "ログイン・ログアウト実装"
    content: |
      ## 認証フロー
      
      ### 1. ログインページ
      ```typescript
      // app/(auth)/login/page.tsx
      'use client';
      
      import { signIn } from 'next-auth/react';
      import { useState } from 'react';
      import { useRouter } from 'next/navigation';
      
      export default function LoginPage() {
        const router = useRouter();
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [error, setError] = useState('');
        const [loading, setLoading] = useState(false);
        
        const handleSubmit = async (e: React.FormEvent) => {
          e.preventDefault();
          setLoading(true);
          setError('');
          
          try {
            const result = await signIn('credentials', {
              email,
              password,
              redirect: false,
            });
            
            if (result?.error) {
              setError(result.error);
            } else {
              router.push('/dashboard');
              router.refresh();
            }
          } catch (error) {
            setError('ログインに失敗しました');
          } finally {
            setLoading(false);
          }
        };
        
        return (
          <div className="flex min-h-screen items-center justify-center">
            <div className="w-full max-w-md p-8 bg-white rounded-lg border">
              <h1 className="text-2xl font-bold mb-6">ログイン</h1>
              
              {error && (
                <div className="mb-4 p-3 bg-red-100 text-red-700 rounded">
                  {error}
                </div>
              )}
              
              <form onSubmit={handleSubmit} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium mb-1">
                    メールアドレス
                  </label>
                  <input
                    type="email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    className="w-full px-3 py-2 border rounded"
                    required
                  />
                </div>
                
                <div>
                  <label className="block text-sm font-medium mb-1">
                    パスワード
                  </label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className="w-full px-3 py-2 border rounded"
                    required
                  />
                </div>
                
                <button
                  type="submit"
                  disabled={loading}
                  className="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50"
                >
                  {loading ? 'ログイン中...' : 'ログイン'}
                </button>
              </form>
              
              <div className="mt-6">
                <div className="relative">
                  <div className="absolute inset-0 flex items-center">
                    <div className="w-full border-t"></div>
                  </div>
                  <div className="relative flex justify-center text-sm">
                    <span className="px-2 bg-white text-gray-500">または</span>
                  </div>
                </div>
                
                <div className="mt-6 space-y-3">
                  <button
                    onClick={() => signIn('google', { callbackUrl: '/dashboard' })}
                    className="w-full py-2 border rounded hover:bg-gray-50"
                  >
                    Googleでログイン
                  </button>
                  
                  <button
                    onClick={() => signIn('github', { callbackUrl: '/dashboard' })}
                    className="w-full py-2 border rounded hover:bg-gray-50"
                  >
                    GitHubでログイン
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }
      ```
      
      ### 2. ユーザー登録
      ```typescript
      // app/actions/auth.actions.ts
      'use server';
      
      import bcrypt from 'bcryptjs';
      import { prisma } from '@/lib/db/prisma';
      import { z } from 'zod';
      
      const registerSchema = z.object({
        name: z.string().min(2, '名前は2文字以上である必要があります'),
        email: z.string().email('有効なメールアドレスを入力してください'),
        password: z.string().min(8, 'パスワードは8文字以上である必要があります'),
      });
      
      export async function registerUser(formData: FormData) {
        const rawData = {
          name: formData.get('name') as string,
          email: formData.get('email') as string,
          password: formData.get('password') as string,
        };
        
        // バリデーション
        const result = registerSchema.safeParse(rawData);
        if (!result.success) {
          return {
            success: false,
            errors: result.error.flatten().fieldErrors,
          };
        }
        
        const { name, email, password } = result.data;
        
        // メールアドレスの重複チェック
        const existingUser = await prisma.user.findUnique({
          where: { email },
        });
        
        if (existingUser) {
          return {
            success: false,
            error: 'このメールアドレスは既に使用されています',
          };
        }
        
        // パスワードのハッシュ化
        const hashedPassword = await bcrypt.hash(password, 10);
        
        // ユーザーの作成
        const user = await prisma.user.create({
          data: {
            name,
            email,
            password: hashedPassword,
          },
        });
        
        return {
          success: true,
          user: {
            id: user.id,
            name: user.name,
            email: user.email,
          },
        };
      }
      ```
      
      ### 3. ログアウト
      ```typescript
      // app/components/LogoutButton.tsx
      'use client';
      
      import { signOut } from 'next-auth/react';
      
      export function LogoutButton() {
        return (
          <button
            onClick={() => signOut({ callbackUrl: '/' })}
            className="px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded"
          >
            ログアウト
          </button>
        );
      }
      ```

  - name: "セッション管理"
    content: |
      ## セッションの取得と使用
      
      ### 1. Server Componentでのセッション取得
      ```typescript
      // app/dashboard/page.tsx
      import { getServerSession } from 'next-auth';
      import { authOptions } from '@/lib/auth/config';
      import { redirect } from 'next/navigation';
      
      export default async function DashboardPage() {
        const session = await getServerSession(authOptions);
        
        if (!session) {
          redirect('/login');
        }
        
        return (
          <div>
            <h1>ダッシュボード</h1>
            <p>ようこそ、{session.user?.name}さん</p>
          </div>
        );
      }
      ```
      
      ### 2. Client Componentでのセッション取得
      ```typescript
      // app/components/UserProfile.tsx
      'use client';
      
      import { useSession } from 'next-auth/react';
      
      export function UserProfile() {
        const { data: session, status } = useSession();
        
        if (status === 'loading') {
          return <div>読み込み中...</div>;
        }
        
        if (status === 'unauthenticated') {
          return <div>ログインしてください</div>;
        }
        
        return (
          <div>
            <p>ユーザー名: {session?.user?.name}</p>
            <p>メール: {session?.user?.email}</p>
          </div>
        );
      }
      ```
      
      ### 3. SessionProviderの設定
      ```typescript
      // app/providers/SessionProvider.tsx
      'use client';
      
      import { SessionProvider as NextAuthSessionProvider } from 'next-auth/react';
      
      export function SessionProvider({ children }: { children: React.ReactNode }) {
        return <NextAuthSessionProvider>{children}</NextAuthSessionProvider>;
      }
      
      // app/layout.tsx
      import { SessionProvider } from './providers/SessionProvider';
      
      export default function RootLayout({ children }: { children: React.ReactNode }) {
        return (
          <html lang="ja">
            <body>
              <SessionProvider>
                {children}
              </SessionProvider>
            </body>
          </html>
        );
      }
      ```
      
      ### 4. カスタムフック
      ```typescript
      // hooks/useAuth.ts
      'use client';
      
      import { useSession } from 'next-auth/react';
      import { useRouter } from 'next/navigation';
      import { useEffect } from 'react';
      
      export function useAuth(requireAuth: boolean = true) {
        const { data: session, status } = useSession();
        const router = useRouter();
        
        useEffect(() => {
          if (requireAuth && status === 'unauthenticated') {
            router.push('/login');
          }
        }, [requireAuth, status, router]);
        
        return {
          session,
          status,
          isLoading: status === 'loading',
          isAuthenticated: status === 'authenticated',
        };
      }
      ```

  - name: "認可（ロールベースアクセス制御）"
    content: |
      ## 権限管理
      
      ### 1. ミドルウェアでの認可
      ```typescript
      // middleware.ts
      import { withAuth } from 'next-auth/middleware';
      import { NextResponse } from 'next/server';
      
      export default withAuth(
        function middleware(req) {
          const token = req.nextauth.token;
          const path = req.nextUrl.pathname;
          
          // 管理者専用ページ
          if (path.startsWith('/admin') && token?.role !== 'ADMIN') {
            return NextResponse.redirect(new URL('/unauthorized', req.url));
          }
          
          return NextResponse.next();
        },
        {
          callbacks: {
            authorized: ({ token }) => !!token,
          },
        }
      );
      
      export const config = {
        matcher: ['/dashboard/:path*', '/admin/:path*'],
      };
      ```
      
      ### 2. Server Componentでの認可
      ```typescript
      // lib/auth/authorization.ts
      import { getServerSession } from 'next-auth';
      import { authOptions } from './config';
      import { redirect } from 'next/navigation';
      
      export async function requireAuth() {
        const session = await getServerSession(authOptions);
        if (!session) {
          redirect('/login');
        }
        return session;
      }
      
      export async function requireAdmin() {
        const session = await requireAuth();
        if (session.user?.role !== 'ADMIN') {
          redirect('/unauthorized');
        }
        return session;
      }
      
      // 使用例
      // app/admin/page.tsx
      import { requireAdmin } from '@/lib/auth/authorization';
      
      export default async function AdminPage() {
        await requireAdmin();
        
        return <div>管理者ページ</div>;
      }
      ```
      
      ### 3. API Routeでの認可
      ```typescript
      // app/api/admin/users/route.ts
      import { getServerSession } from 'next-auth';
      import { authOptions } from '@/lib/auth/config';
      import { NextResponse } from 'next/server';
      
      export async function GET() {
        const session = await getServerSession(authOptions);
        
        if (!session) {
          return NextResponse.json(
            { error: 'Unauthorized' },
            { status: 401 }
          );
        }
        
        if (session.user?.role !== 'ADMIN') {
          return NextResponse.json(
            { error: 'Forbidden' },
            { status: 403 }
          );
        }
        
        // 管理者のみアクセス可能
        const users = await prisma.user.findMany();
        return NextResponse.json(users);
      }
      ```
      
      ### 4. Client Componentでの認可
      ```typescript
      // components/AdminOnly.tsx
      'use client';
      
      import { useSession } from 'next-auth/react';
      
      export function AdminOnly({ children }: { children: React.ReactNode }) {
        const { data: session } = useSession();
        
        if (session?.user?.role !== 'ADMIN') {
          return null;
        }
        
        return <>{children}</>;
      }
      
      // 使用例
      <AdminOnly>
        <button>管理者専用ボタン</button>
      </AdminOnly>
      ```

  - name: "パスワードリセット"
    content: |
      ## パスワードリセット機能
      
      ### 1. リセットトークンの生成
      ```typescript
      // app/actions/password-reset.actions.ts
      'use server';
      
      import { prisma } from '@/lib/db/prisma';
      import crypto from 'crypto';
      import { sendEmail } from '@/lib/email';
      
      export async function requestPasswordReset(email: string) {
        const user = await prisma.user.findUnique({ where: { email } });
        
        if (!user) {
          // セキュリティのため、ユーザーが存在しない場合も成功を返す
          return { success: true };
        }
        
        // リセットトークンの生成
        const resetToken = crypto.randomBytes(32).toString('hex');
        const resetTokenExpiry = new Date(Date.now() + 3600000); // 1時間後
        
        await prisma.user.update({
          where: { id: user.id },
          data: {
            resetToken,
            resetTokenExpiry,
          },
        });
        
        // メール送信
        const resetUrl = `${process.env.NEXTAUTH_URL}/reset-password?token=${resetToken}`;
        await sendEmail({
          to: email,
          subject: 'パスワードリセット',
          html: `
            <p>パスワードリセットのリクエストを受け付けました。</p>
            <p>以下のリンクをクリックしてパスワードをリセットしてください：</p>
            <a href="${resetUrl}">${resetUrl}</a>
            <p>このリンクは1時間有効です。</p>
          `,
        });
        
        return { success: true };
      }
      
      export async function resetPassword(token: string, newPassword: string) {
        const user = await prisma.user.findFirst({
          where: {
            resetToken: token,
            resetTokenExpiry: {
              gt: new Date(),
            },
          },
        });
        
        if (!user) {
          return {
            success: false,
            error: '無効または期限切れのトークンです',
          };
        }
        
        const hashedPassword = await bcrypt.hash(newPassword, 10);
        
        await prisma.user.update({
          where: { id: user.id },
          data: {
            password: hashedPassword,
            resetToken: null,
            resetTokenExpiry: null,
          },
        });
        
        return { success: true };
      }
      ```

best_practices:
  - "パスワードは必ずbcryptなどでハッシュ化して保存"
  - "NEXTAUTH_SECRETは強力なランダム文字列を使用"
  - "セッションの有効期限を適切に設定"
  - "ミドルウェアで認証が必要なルートを保護"
  - "ロールベースアクセス制御でページやAPIを保護"
  - "パスワードリセット機能を実装してユーザビリティを向上"
  - "OAuth認証（Google、GitHubなど）を提供してユーザー登録を簡単に"
  - "セッション情報にはJWTを使用してスケーラビリティを確保"
  - "認証エラーは具体的すぎる情報を返さない（セキュリティ）"
  - "2要素認証（2FA）の実装を検討"
